<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Project Management | Shehraz Khalid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030306;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --accent-primary: #00ff88;
            --accent-secondary: #7b2fff;
            --accent-tertiary: #ff2d6a;
            --accent-warning: #ffaa00;
            --text-bright: #ffffff;
            --text-body: #a8b2c1;
            --text-muted: #5a6378;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-body);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* Admin Header */
        .admin-header {
            background: var(--bg-dark);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .admin-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-logo span {
            background: var(--accent-primary);
            color: var(--bg-deep);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-deep);
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-bright);
            border: 1px solid var(--text-muted);
        }
        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-danger {
            background: transparent;
            color: var(--accent-tertiary);
            border: 1px solid var(--accent-tertiary);
        }
        .btn-danger:hover {
            background: var(--accent-tertiary);
            color: var(--bg-deep);
        }

        /* Admin Container */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text-bright);
        }

        /* Projects Table */
        .projects-table-container {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .projects-table {
            width: 100%;
            border-collapse: collapse;
        }

        .projects-table th,
        .projects-table td {
            padding: 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .projects-table th {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--bg-dark);
        }

        .projects-table tr:hover td {
            background: var(--bg-card-hover);
        }

        .project-thumb {
            width: 80px;
            height: 50px;
            background: var(--bg-dark);
            border-radius: 6px;
            overflow: hidden;
        }

        .project-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--text-bright);
            margin-bottom: 5px;
        }

        .project-category {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .status-badge {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .status-shipped { background: rgba(0, 255, 136, 0.15); color: var(--accent-primary); }
        .status-released { background: rgba(123, 47, 255, 0.15); color: var(--accent-secondary); }
        .status-production { background: rgba(255, 170, 0, 0.15); color: var(--accent-warning); }
        .status-development { background: rgba(255, 45, 106, 0.15); color: var(--accent-tertiary); }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tech-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            background: rgba(123, 47, 255, 0.15);
            color: var(--accent-secondary);
            border-radius: 3px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 1rem;
        }

        .action-btn.edit {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-primary);
        }
        .action-btn.edit:hover {
            background: var(--accent-primary);
            color: var(--bg-deep);
        }

        .action-btn.delete {
            background: rgba(255, 45, 106, 0.15);
            color: var(--accent-tertiary);
        }
        .action-btn.delete:hover {
            background: var(--accent-tertiary);
            color: var(--bg-deep);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--text-bright);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--accent-tertiary);
            color: var(--bg-deep);
        }

        .modal-body {
            padding: 30px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-bright);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-primary);
        }

        /* Modal Footer */
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--accent-primary);
            color: var(--bg-deep);
        }

        .notification.error {
            background: var(--accent-tertiary);
            color: var(--bg-deep);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .admin-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            .admin-container {
                padding: 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .projects-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="admin-logo">
            SHEHRAZ.DEV <span>ADMIN</span>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn btn-secondary" target="_blank">View Site</a>
            <button class="btn btn-primary" onclick="openModal()">+ Add Project</button>
        </div>
    </header>

    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Projects</div>
                <div class="value" id="totalProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Featured</div>
                <div class="value" id="featuredProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Shipped</div>
                <div class="value" id="shippedProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="label">In Progress</div>
                <div class="value" id="progressProjects">0</div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">All Projects</h2>
        </div>

        <div class="projects-table-container">
            <table class="projects-table">
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Technologies</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add New Project</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label class="form-label">Project Title *</label>
                            <input type="text" class="form-input" id="title" required placeholder="e.g., Hyper-Casual Game Collection">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Short Description *</label>
                            <input type="text" class="form-input" id="shortDescription" required placeholder="Brief description for cards">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="category">
                                <option value="mobile">Mobile Games</option>
                                <option value="tools">Tools & Framework</option>
                                <option value="web">Web Games</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="status">
                                <option value="shipped">Shipped</option>
                                <option value="released">Released</option>
                                <option value="production">In Production</option>
                                <option value="development">In Development</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Full Description</label>
                            <textarea class="form-textarea" id="description" placeholder="Detailed project description..."></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Thumbnail URL</label>
                            <input type="url" class="form-input" id="thumbnail" placeholder="https://...">
                            <div class="form-hint">Used in project cards</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Images (comma separated URLs)</label>
                            <input type="text" class="form-input" id="images" placeholder="url1, url2, url3">
                            <div class="form-hint">Screenshots for gallery</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Role</label>
                            <input type="text" class="form-input" id="role" placeholder="Lead Developer">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Duration</label>
                            <input type="text" class="form-input" id="duration" placeholder="3 months">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Team Size</label>
                            <input type="number" class="form-input" id="teamSize" min="1" value="1">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Platform</label>
                            <input type="text" class="form-input" id="platform" placeholder="Android, iOS">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Downloads</label>
                            <input type="text" class="form-input" id="downloads" placeholder="10K+">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Year</label>
                            <input type="text" class="form-input" id="year" placeholder="2024">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Technologies (comma separated)</label>
                            <input type="text" class="form-input" id="technologies" placeholder="Unity 3D, C#, AdMob">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Video URL</label>
                            <input type="url" class="form-input" id="videoUrl" placeholder="YouTube or video link">
                        </div>

                        <div class="form-group">
                            <label class="form-label">APK URL</label>
                            <input type="url" class="form-input" id="apkUrl" placeholder="Direct APK download link">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Play Store URL</label>
                            <input type="url" class="form-input" id="playStoreUrl" placeholder="Google Play Store link">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Key Features (one per line)</label>
                            <textarea class="form-textarea" id="features" style="min-height: 150px;" placeholder="Feature 1&#10;Feature 2&#10;Feature 3"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Project ID (for URL)</label>
                            <input type="text" class="form-input" id="projectIdInput" placeholder="my-project-name">
                            <div class="form-hint">Use lowercase, hyphens instead of spaces</div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="featured" checked>
                                <label for="featured">Featured on homepage</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        let projects = [];

        // Load projects
        async function loadProjects() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                projects = data.projects;
                renderTable();
                updateStats();
            } catch (error) {
                showNotification('Error loading projects', 'error');
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalProjects').textContent = projects.length;
            document.getElementById('featuredProjects').textContent = projects.filter(p => p.featured).length;
            document.getElementById('shippedProjects').textContent = projects.filter(p => p.status === 'shipped' || p.status === 'released').length;
            document.getElementById('progressProjects').textContent = projects.filter(p => p.status === 'production' || p.status === 'development').length;
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('projectsTableBody');
            tbody.innerHTML = projects.map(project => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="project-thumb">
                                <img src="${project.thumbnail}" alt="">
                            </div>
                            <div>
                                <div class="project-title">${project.title}</div>
                                <div class="project-category">${project.id}</div>
                            </div>
                        </div>
                    </td>
                    <td style="text-transform: capitalize;">${project.category}</td>
                    <td><span class="status-badge status-${project.status}">${project.status}</span></td>
                    <td>
                        <div class="tech-tags">
                            ${project.technologies.slice(0, 3).map(t => `<span class="tech-tag">${t}</span>`).join('')}
                            ${project.technologies.length > 3 ? `<span class="tech-tag">+${project.technologies.length - 3}</span>` : ''}
                        </div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit" onclick="editProject('${project.id}')" title="Edit">✏️</button>
                            <button class="action-btn delete" onclick="deleteProject('${project.id}')" title="Delete">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Open modal
        function openModal(projectId = null) {
            document.getElementById('projectModal').classList.add('active');
            document.getElementById('projectForm').reset();
            
            if (projectId) {
                const project = projects.find(p => p.id === projectId);
                if (project) {
                    document.getElementById('modalTitle').textContent = 'Edit Project';
                    populateForm(project);
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Add New Project';
                document.getElementById('projectId').value = '';
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        // Populate form
        function populateForm(project) {
            document.getElementById('projectId').value = project.id;
            document.getElementById('projectIdInput').value = project.id;
            document.getElementById('title').value = project.title;
            document.getElementById('shortDescription').value = project.shortDescription;
            document.getElementById('description').value = project.description || '';
            document.getElementById('category').value = project.category;
            document.getElementById('status').value = project.status;
            document.getElementById('thumbnail').value = project.thumbnail || '';
            document.getElementById('images').value = project.images?.join(', ') || '';
            document.getElementById('technologies').value = project.technologies.join(', ');
            document.getElementById('role').value = project.role || '';
            document.getElementById('duration').value = project.duration || '';
            document.getElementById('teamSize').value = project.teamSize || 1;
            document.getElementById('platform').value = project.platform || '';
            document.getElementById('downloads').value = project.downloads || '';
            document.getElementById('year').value = project.year || '';
            document.getElementById('videoUrl').value = project.videoUrl || '';
            document.getElementById('apkUrl').value = project.apkUrl || '';
            document.getElementById('playStoreUrl').value = project.playStoreUrl || '';
            document.getElementById('features').value = project.features?.join('\n') || '';
            document.getElementById('featured').checked = project.featured;
        }

        // Edit project
        function editProject(id) {
            openModal(id);
        }

        // Save project
        function saveProject() {
            const id = document.getElementById('projectIdInput').value.toLowerCase().replace(/\s+/g, '-');
            
            if (!id) {
                showNotification('Please enter a Project ID', 'error');
                return;
            }

            const projectData = {
                id: id,
                title: document.getElementById('title').value,
                shortDescription: document.getElementById('shortDescription').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                status: document.getElementById('status').value,
                thumbnail: document.getElementById('thumbnail').value,
                images: document.getElementById('images').value.split(',').map(s => s.trim()).filter(s => s),
                technologies: document.getElementById('technologies').value.split(',').map(s => s.trim()).filter(s => s),
                role: document.getElementById('role').value,
                duration: document.getElementById('duration').value,
                teamSize: parseInt(document.getElementById('teamSize').value) || 1,
                platform: document.getElementById('platform').value,
                downloads: document.getElementById('downloads').value,
                year: document.getElementById('year').value,
                videoUrl: document.getElementById('videoUrl').value,
                apkUrl: document.getElementById('apkUrl').value,
                playStoreUrl: document.getElementById('playStoreUrl').value,
                features: document.getElementById('features').value.split('\n').map(s => s.trim()).filter(s => s),
                featured: document.getElementById('featured').checked
            };

            // Check for duplicate ID
            const existingIndex = projects.findIndex(p => p.id === id);
            if (existingIndex >= 0) {
                projects[existingIndex] = projectData;
                showNotification('Project updated successfully!', 'success');
            } else {
                projects.push(projectData);
                showNotification('Project added successfully!', 'success');
            }

            // Save to localStorage (simulated save)
            localStorage.setItem('portfolio_projects', JSON.stringify(projects));
            
            renderTable();
            updateStats();
            closeModal();

            // For demo: also show download option
            downloadJson();
        }

        // Delete project
        function deleteProject(id) {
            if (confirm(`Are you sure you want to delete "${projects.find(p => p.id === id)?.title}"?`)) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('portfolio_projects', JSON.stringify(projects));
                renderTable();
                updateStats();
                showNotification('Project deleted', 'success');
                downloadJson();
            }
        }

        // Download JSON
        function downloadJson() {
            const data = { projects: projects };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'projects.json';
            // Auto-trigger download (optional for demo)
            // a.click();
            URL.revokeObjectURL(url);
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Initialize
        loadProjects();

        // Check for saved data
        const savedProjects = localStorage.getItem('portfolio_projects');
        if (savedProjects) {
            try {
                projects = JSON.parse(savedProjects);
                renderTable();
                updateStats();
            } catch (e) {}
        }

        // Close modal on outside click
        document.getElementById('projectModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });
    </script>

</body>
</html>
