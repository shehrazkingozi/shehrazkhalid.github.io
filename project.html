<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Shehraz Khalid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030306;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --accent-primary: #00ff88;
            --accent-secondary: #7b2fff;
            --accent-tertiary: #ff2d6a;
            --text-bright: #ffffff;
            --text-body: #a8b2c1;
            --text-muted: #5a6378;
            --glow-primary: rgba(0, 255, 136, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-body);
            line-height: 1.7;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }

        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(3, 3, 6, 0.95), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-bright);
            text-decoration: none;
            letter-spacing: 2px;
        }
        .logo::before { content: '<'; color: var(--accent-primary); margin-right: 2px; }
        .logo::after { content: '/>'; color: var(--accent-primary); margin-left: 2px; }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-body);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--text-bright); }

        .back-link {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--accent-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: gap 0.3s;
        }
        .back-link:hover { gap: 12px; }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }
        .nav-toggle span {
            width: 25px; height: 2px;
            background: var(--accent-primary);
        }

        /* Hero Section */
        .project-hero {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 60px 60px;
            text-align: center;
        }

        .project-status {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 4px;
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            margin-bottom: 20px;
        }

        .project-hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 20px;
            max-width: 800px;
        }

        .project-meta {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .meta-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--accent-primary);
        }

        /* Image Gallery */
        .gallery-section {
            padding: 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .main-image {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-image .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text-muted);
            letter-spacing: 4px;
        }

        .thumbnail-strip {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .thumbnail {
            width: 150px;
            height: 100px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .thumbnail:hover,
        .thumbnail.active {
            border-color: var(--accent-primary);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Video Section */
        .video-section {
            padding: 40px 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .video-placeholder .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .video-placeholder .text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* Content Sections */
        .content-section {
            padding: 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text-bright);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::before {
            content: '//';
            color: var(--accent-primary);
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.9;
            white-space: pre-line;
        }

        /* Tech Stack */
        .tech-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tech-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(123, 47, 255, 0.15);
            border: 1px solid rgba(123, 47, 255, 0.3);
            color: var(--accent-secondary);
            border-radius: 4px;
        }

        /* Features List */
        .features-list {
            display: grid;
            gap: 15px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 8px;
            border-left: 3px solid var(--accent-primary);
        }

        .feature-icon {
            color: var(--accent-primary);
            font-size: 1.2rem;
        }

        .feature-text {
            color: var(--text-body);
        }

        /* Download Section */
        .download-section {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .download-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 30px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
            transform: translateY(-3px);
        }

        .download-btn .icon {
            font-size: 1.5rem;
        }

        .download-btn .text {
            text-align: left;
        }

        .download-btn .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-bright);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Navigation Buttons */
        .project-nav {
            padding: 60px;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-body);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .nav-btn:hover { color: var(--accent-primary); }
        .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* Footer */
        footer {
            background: var(--bg-dark);
            padding: 40px 60px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        /* Mobile */
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .nav-links { 
                display: none; 
                position: fixed;
                top: 60px; left: 0;
                width: 100%;
                background: var(--bg-dark);
                flex-direction: column;
                padding: 20px;
            }
            .nav-links.active { display: flex; }
            .nav-toggle { display: flex; }
            .project-hero { padding: 100px 20px 40px; }
            .project-hero h1 { font-size: 2rem; }
            .project-meta { gap: 20px; }
            .gallery-section, .video-section, .content-section { padding: 30px 20px; }
            .project-nav { padding: 40px 20px; flex-direction: column; gap: 20px; }
            .download-section { flex-direction: column; }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-primary);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="logo">SHEHRAZ</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#skills">Skills</a></li>
            <li><a href="index.html#experience">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <a href="projects.html" class="back-link">← Back to Projects</a>
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div id="project-content">
        <div class="loading">LOADING PROJECT...</div>
    </div>

    <footer>
        <p>© 2026 <a href="index.html">Shehraz Khalid</a>. All Rights Reserved.</p>
    </footer>

    <script>
        // Mobile nav toggle
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        navToggle.addEventListener('click', () => navLinks.classList.toggle('active'));
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => navLinks.classList.remove('active'));
        });

        // Get project ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        // Load project data
        async function loadProject() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                const project = data.projects.find(p => p.id === projectId);
                
                if (!project) {
                    document.getElementById('project-content').innerHTML = `
                        <div class="project-hero" style="min-height:80vh">
                            <div>
                                <h1 style="color: var(--accent-tertiary)">Project Not Found</h1>
                                <a href="projects.html" class="back-link" style="margin-top:20px">← Back to Projects</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                // Get prev/next projects
                const currentIndex = data.projects.findIndex(p => p.id === projectId);
                const prevProject = currentIndex > 0 ? data.projects[currentIndex - 1] : null;
                const nextProject = currentIndex < data.projects.length - 1 ? data.projects[currentIndex + 1] : null;

                // Build images HTML
                const imagesHtml = project.images.map((img, i) => 
                    `<div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeMainImage('${img}')">
                        <img src="${img}" alt="Screenshot ${i + 1}">
                    </div>`
                ).join('');

                // Build tech stack HTML
                const techHtml = project.technologies.map(tech => 
                    `<span class="tech-tag">${tech}</span>`
                ).join('');

                // Build features HTML
                const featuresHtml = project.features.map(feature => 
                    `<div class="feature-item">
                        <span class="feature-icon">▹</span>
                        <span class="feature-text">${feature}</span>
                    </div>`
                ).join('');

                // Build download buttons
                let downloadHtml = '';
                if (project.apkUrl) {
                    downloadHtml += `
                        <a href="${project.apkUrl}" class="download-btn" target="_blank">
                            <span class="icon">📱</span>
                            <div class="text">
                                <div class="label">Download</div>
                                <div class="value">APK File</div>
                            </div>
                        </a>`;
                }
                if (project.playStoreUrl) {
                    downloadHtml += `
                        <a href="${project.playStoreUrl}" class="download-btn" target="_blank">
                            <span class="icon">▶️</span>
                            <div class="text">
                                <div class="label">Get on</div>
                                <div class="value">Play Store</div>
                            </div>
                        </a>`;
                }
                if (project.videoUrl) {
                    downloadHtml += `
                        <a href="${project.videoUrl}" class="download-btn" target="_blank">
                            <span class="icon">🎬</span>
                            <div class="text">
                                <div class="label">Watch</div>
                                <div class="value">Video Demo</div>
                            </div>
                        </a>`;
                }

                // Render project
                document.getElementById('project-content').innerHTML = `
                    <section class="project-hero">
                        <div>
                            <span class="project-status">${project.status.toUpperCase()}</span>
                            <h1>${project.title}</h1>
                            <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">${project.shortDescription}</p>
                            
                            <div class="project-meta">
                                <div class="meta-item">
                                    <div class="meta-label">Role</div>
                                    <div class="meta-value">${project.role}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Duration</div>
                                    <div class="meta-value">${project.duration}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Team</div>
                                    <div class="meta-value">${project.teamSize} Devs</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Platform</div>
                                    <div class="meta-value">${project.platform}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Downloads</div>
                                    <div class="meta-value">${project.downloads}</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="gallery-section">
                        <div class="main-image" id="mainImage">
                            <img src="${project.images[0]}" alt="${project.title}">
                        </div>
                        <div class="thumbnail-strip">
                            ${imagesHtml}
                        </div>
                    </section>

                    ${project.videoUrl ? `
                    <section class="video-section">
                        <div class="video-container">
                            <iframe width="100%" height="100%" src="${project.videoUrl}" frameborder="0" allowfullscreen style="border-radius: 12px;"></iframe>
                        </div>
                    </section>
                    ` : ''}

                    <section class="content-section">
                        <h2 class="section-title">About This Project</h2>
                        <p class="description">${project.description}</p>
                    </section>

                    <section class="content-section">
                        <h2 class="section-title">Stats</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <span class="stat-value">${project.downloads}</span>
                                <span class="stat-label">Downloads</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value">${project.duration}</span>
                                <span class="stat-label">Duration</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value">${project.teamSize}</span>
                                <span class="stat-label">Team Size</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value">${project.year}</span>
                                <span class="stat-label">Year</span>
                            </div>
                        </div>
                    </section>

                    <section class="content-section">
                        <h2 class="section-title">Technologies Used</h2>
                        <div class="tech-grid">
                            ${techHtml}
                        </div>
                    </section>

                    <section class="content-section">
                        <h2 class="section-title">Key Features</h2>
                        <div class="features-list">
                            ${featuresHtml}
                        </div>
                    </section>

                    ${downloadHtml ? `
                    <section class="content-section">
                        <h2 class="section-title">Downloads & Links</h2>
                        <div class="download-section">
                            ${downloadHtml}
                        </div>
                    </section>
                    ` : ''}

                    <nav class="project-nav">
                        <a href="project.html?id=${prevProject?.id || ''}" class="nav-btn ${!prevProject ? 'disabled' : ''}">
                            ← ${prevProject ? prevProject.title : 'No Previous Project'}
                        </a>
                        <a href="project.html?id=${nextProject?.id || ''}" class="nav-btn ${!nextProject ? 'disabled' : ''}">
                            ${nextProject ? nextProject.title : 'No Next Project'} →
                        </a>
                    </nav>
                `;

                // Update page title
                document.title = `${project.title} | Shehraz Khalid`;

            } catch (error) {
                console.error('Error loading project:', error);
                document.getElementById('project-content').innerHTML = `
                    <div class="project-hero" style="min-height:80vh">
                        <div>
                            <h1 style="color: var(--accent-tertiary)">Error Loading Project</h1>
                            <p style="color: var(--text-muted); margin: 20px 0;">Please try again later.</p>
                            <a href="projects.html" class="back-link">← Back to Projects</a>
                        </div>
                    </div>
                `;
            }
        }

        function changeMainImage(src) {
            document.querySelector('.main-image img').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        loadProject();
    </script>
</body>
</html>
