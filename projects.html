<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects | Shehraz Khalid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030306;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --accent-primary: #00ff88;
            --accent-secondary: #7b2fff;
            --accent-tertiary: #ff2d6a;
            --text-bright: #ffffff;
            --text-body: #a8b2c1;
            --text-muted: #5a6378;
            --glow-primary: rgba(0, 255, 136, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-body);
            line-height: 1.7;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }

        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(3, 3, 6, 0.95), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-bright);
            text-decoration: none;
            letter-spacing: 2px;
        }
        .logo::before { content: '<'; color: var(--accent-primary); margin-right: 2px; }
        .logo::after { content: '/>'; color: var(--accent-primary); margin-left: 2px; }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-body);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--text-bright); }
        .nav-links a.active { color: var(--accent-primary); }

        .back-link {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--accent-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }
        .nav-toggle span {
            width: 25px; height: 2px;
            background: var(--accent-primary);
        }

        /* Hero */
        .page-hero {
            padding: 150px 60px 60px;
            text-align: center;
        }

        .section-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-secondary);
            margin-bottom: 15px;
            display: block;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 20px;
        }

        .page-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter Buttons */
        .filter-section {
            padding: 0 60px 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-body);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(0, 255, 136, 0.1);
        }

        /* Projects Grid */
        .projects-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px 100px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow-primary);
        }

        .project-image {
            height: 220px;
            background: var(--bg-card-hover);
            position: relative;
            overflow: hidden;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .project-card:hover .project-image img {
            transform: scale(1.05);
        }

        .project-image .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .project-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(18, 18, 26, 0.95), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }

        .project-category {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .project-info {
            padding: 25px;
        }

        .project-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--text-bright);
            margin-bottom: 12px;
        }

        .project-info p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .project-tech-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tech-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 10px;
            background: rgba(123, 47, 255, 0.15);
            border: 1px solid rgba(123, 47, 255, 0.3);
            color: var(--accent-secondary);
            border-radius: 4px;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-project {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            transition: gap 0.3s;
        }

        .project-card:hover .view-project {
            gap: 12px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .no-results .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .no-results h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text-bright);
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            background: var(--bg-dark);
            padding: 40px 60px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-primary);
            letter-spacing: 3px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .nav-links { 
                display: none; 
                position: fixed;
                top: 60px; left: 0;
                width: 100%;
                background: var(--bg-dark);
                flex-direction: column;
                padding: 20px;
            }
            .nav-links.active { display: flex; }
            .nav-toggle { display: flex; }
            .back-link { display: none; }
            .page-hero { padding: 100px 20px 40px; }
            .page-title { font-size: 2.5rem; }
            .filter-section { padding: 0 20px 30px; }
            .projects-container { padding: 0 20px 60px; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="logo">SHEHRAZ</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#skills">Skills</a></li>
            <li><a href="index.html#experience">Experience</a></li>
            <li><a href="projects.html" class="active">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <a href="index.html" class="back-link">← Back to Home</a>
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="page-hero">
        <span class="section-tag">// Portfolio</span>
        <h1 class="page-title">All Projects</h1>
        <p class="page-subtitle">A collection of games and tools I've developed throughout my career as a Unity game developer.</p>
    </section>

    <div class="filter-section">
        <button class="filter-btn active" data-filter="all">All Projects</button>
        <button class="filter-btn" data-filter="mobile">Mobile Games</button>
        <button class="filter-btn" data-filter="tools">Tools & Framework</button>
        <button class="filter-btn" data-filter="web">Web Games</button>
    </div>

    <div class="projects-container">
        <div class="projects-grid" id="projectsGrid">
            <div class="loading">LOADING PROJECTS...</div>
        </div>
    </div>

    <footer>
        <p>© 2026 <a href="index.html">Shehraz Khalid</a>. All Rights Reserved.</p>
    </footer>

    <script>
        // Mobile nav toggle
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        navToggle.addEventListener('click', () => navLinks.classList.toggle('active'));
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => navLinks.classList.remove('active'));
        });

        let allProjects = [];

        // Load projects
        async function loadProjects() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                allProjects = data.projects;
                renderProjects(allProjects);
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projectsGrid').innerHTML = `
                    <div class="no-results">
                        <div class="icon">⚠️</div>
                        <h3>Error Loading Projects</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Render projects
        function renderProjects(projects) {
            const grid = document.getElementById('projectsGrid');
            
            if (projects.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="icon">🔍</div>
                        <h3>No Projects Found</h3>
                        <p>No projects match the selected category.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = projects.map(project => `
                <a href="project.html?id=${project.id}" class="project-card">
                    <div class="project-image">
                        <img src="${project.thumbnail}" alt="${project.title}">
                        <div class="project-overlay">
                            <span class="project-status">${project.status}</span>
                            <span class="project-category">${project.category}</span>
                        </div>
                    </div>
                    <div class="project-info">
                        <h3>${project.title}</h3>
                        <p>${project.shortDescription}</p>
                        <div class="project-tech-list">
                            ${project.technologies.slice(0, 4).map(t => `<span class="tech-tag">${t}</span>`).join('')}
                            ${project.technologies.length > 4 ? `<span class="tech-tag">+${project.technologies.length - 4}</span>` : ''}
                        </div>
                        <div class="project-meta">
                            <span>📅 ${project.year}</span>
                            <span>📥 ${project.downloads}</span>
                        </div>
                        <div class="view-project">
                            View Details →
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Filter projects
                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    renderProjects(allProjects);
                } else {
                    const filtered = allProjects.filter(p => p.category === filter);
                    renderProjects(filtered);
                }
            });
        });

        loadProjects();
    </script>
</body>
</html>
